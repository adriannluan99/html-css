<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 600px;
        }

        caption {
            font-size: 1.3em;
            font-weight: bolder;
            padding: 8px;
        }

        th,td {
            border: 1px solid black;
            padding: 10px
        }

        .destaque {
            background-color: lightblue;
        }

        .cnome {
            background-color: lightblue;
        }
    </style>
</head>
<body>
    <h1>Exercicios de Tabela</h1>

    <table>
        <colgroup>
            <col class="cnome">
            <col class="csexo">
            <col class="cidade">
            <col class="cprof">
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Adriann</td>
            <td>M</td>
            <td>17</td>
            <td>Auxiliar de Est.</td>
        </tr>
        <tr>
            <td>Ana</td>
            <td>F</td>
            <td>17</td>
            <td>Professora</td>
        </tr>
        <tr>
            <td>Camila</td>
            <td>F</td>
            <td>35</td>
            <td>Empresaria</td>
        </tr>
        <tr>
            <td>Robson</td>
            <td>M</td>
            <td>35</td>
            <td>Gerente</td>
        </tr>
    </table>
</body>
</html>
